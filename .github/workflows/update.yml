name: Update VPN Subscription

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}      # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run updater
        run: python update_sub.py

      - name: Commit and push results
        run: |
          git config user.name "sub-bot"
          git config user.email "sub-bot@users.noreply.github.com"
          git add working_configs.txt subscription.txt
          git diff --quiet --cached || git commit -m "Auto-update subscription $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
